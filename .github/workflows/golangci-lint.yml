name: 'golangci-lint.yml'
run-name: 'Lint'

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ vars.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest